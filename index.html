.htxt h1 span{color:#6c2d8a}
.htxt .sub{color:#666;font-size:0.78rem;margin-top:2px}
.meta{margin-left:auto;display:flex;align-items:center;gap:8px}
.upd{background:#fff;border:1px solid #dde1ea;border-radius:20px;padding:4px 12px;font-size:0.72rem;color:#888}
.filters{max-width:1200px;margin:0 auto 16px;display:flex;flex-wrap:wrap;gap:6px}
.fb{background:#fff;border:1px solid #dde1ea;color:#555;border-radius:20px;padding:5px 14px;font-size:0.76rem;cursor:pointer;transition:all 0.2s}
.fb:hover,.fb.active{background:#6c2d8a;border-color:#6c2d8a;color:#fff}
#content{max-width:1200px;margin:0 auto}
.section{margin-bottom:28px}
.lhdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #e4e8f0;flex-wrap:wrap}
.lflag{font-size:1.3rem}
.lname{font-size:0.95rem;font-weight:700;color:#1a1a2e}
.lbadge{background:#f0e8f8;border:1px solid #d4b8e8;border-radius:12px;padding:2px 9px;font-size:0.68rem;color:#6c2d8a;font-weight:600}
.tw{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.07);border:1px solid #e4e8f0}
table{width:100%;min-width:580px;border-collapse:collapse;background:#fff}
thead{background:#f8f4fc}
thead th{padding:9px 12px;text-align:left;font-size:0.63rem;text-transform:uppercase;letter-spacing:0.06em;color:#6c2d8a;font-weight:700;border-bottom:1px solid #e4e8f0;white-space:nowrap}
th.oc,td.oc{text-align:center}
tbody tr{border-top:1px solid #f0f2f7;transition:background 0.12s}
tbody tr:hover{background:#faf8fc}
td{padding:10px 12px;vertical-align:middle;font-size:0.82rem;color:#2a2a3e}
.teams{display:flex;align-items:center;gap:6px;min-width:200px;flex-wrap:wrap}
.tlogo{width:22px;height:22px;border-radius:50%;object-fit:contain;background:#f5f5f5;padding:2px;flex-shrink:0;border:1px solid #eee}
.tn{font-weight:600;font-size:0.81rem;color:#1a1a2e}
.vs{background:#f0f2f7;color:#999;font-size:0.62rem;font-weight:700;border-radius:4px;padding:1px 5px;flex-shrink:0}
.sbadge{display:inline-block;background:#e8f0fe;color:#1a56db;font-size:0.66rem;font-weight:600;border-radius:20px;padding:2px 8px;border:1px solid #c3d6fc;white-space:nowrap}
.pos{display:inline-block;background:#f0e8f8;border-radius:4px;padding:1px 6px;font-size:0.68rem;color:#6c2d8a;font-weight:600}
.kick{font-weight:600;font-size:0.82rem;white-space:nowrap}
.kick small{display:block;color:#999;font-size:0.63rem;font-weight:400}
.venue{color:#999;font-size:0.7rem;max-width:140px;line-height:1.3}
.rn{color:#ccc;font-size:0.7rem}

/* 1X2 odds pills */
.odds{display:flex;gap:4px;justify-content:center}
.odd{display:flex;flex-direction:column;align-items:center;background:#f8f9fb;border:1px solid #e4e8f0;border-radius:8px;padding:4px 7px;min-width:44px;transition:all 0.15s}
.odd:hover{border-color:#6c2d8a;background:#f0e8f8}
.ol{font-size:0.57rem;font-weight:800;color:#bbb;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:1px}
.ov{font-size:0.84rem;font-weight:700;color:#1a1a2e}
.ov.lo{color:#1a7a1a} /* lowest = best value for bettor marked green */
.na{color:#ccc;font-size:0.7rem;font-style:italic;text-align:center}

footer{text-align:center;color:#aaa;font-size:0.7rem;padding:16px 0 8px;max-width:1200px;margin:0 auto;border-top:1px solid #e4e8f0;margin-top:8px}

@media(max-width:640px){
  .venue,.rn{display:none}
  thead th.hm,td.hm{display:none}
  .tn{font-size:0.74rem}
  .odd{min-width:36px;padding:3px 4px}
  .ov{font-size:0.76rem}
  .teams{min-width:150px}
}
</style>

const FLAGS = {
  "English Premier League":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Spanish La Liga":"🇪🇸","Bundesliga":"🇩🇪",
  "Italian Serie A":"🇮🇹","French Ligue 1":"🇫🇷","Netherlands Eredivisie":"🇳🇱",
  "Saudi Professional League":"🇸🇦"
};

const COMP_ORDER = ["English Premier League","Bundesliga","Spanish La Liga","Italian Serie A","French Ligue 1","Netherlands Eredivisie","Saudi Professional League"];

let active = 'all';

function slug(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,''); }

function fmtTime(iso){
  const d = new Date(iso);
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return {
    t: d.getUTCHours().toString().padStart(2,'0')+':'+d.getUTCMinutes().toString().padStart(2,'0'),
    date: days[d.getUTCDay()]+' '+d.getUTCDate()+' '+months[d.getUTCMonth()]
  };
}

function ord(n){ const s=['th','st','nd','rd'],v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }

function oddsCell(f){
  if(!f.h && !f.d && !f.a) return '<span class="na">–</span>';
  const min = Math.min(f.h,f.d,f.a);
  const pill = (lbl,val) => {
    const cls = val===min?' lo':'';
    return `<div class="odd"><span class="ol">${lbl}</span><span class="ov${cls}">${val.toFixed(2)}</span></div>`;
  };
  return `<div class="odds">${pill('1',f.h)}${pill('X',f.d)}${pill('2',f.a)}</div>`;
}

function render(){
  const groups = {};
  COMP_ORDER.forEach(c => { groups[c]=[]; });
  DATA.forEach(f => { if(groups[f.competition]) groups[f.competition].push(f); });

  // Filter buttons
  let fhtml = `<button class="fb${active==='all'?' active':''}" onclick="setFilter('all',this)">All Leagues</button>`;
  COMP_ORDER.forEach(c => {
    const k=slug(c);
    fhtml += `<button class="fb${active===k?' active':''}" onclick="setFilter('${k}',this)">${FLAGS[c]||''} ${c}</button>`;
  });
  document.getElementById('filters').innerHTML = fhtml;

  let html = '';
  COMP_ORDER.forEach(comp => {
    const rows = groups[comp];
    if(!rows.length) return;
    const k = slug(comp);
    const vis = (active==='all'||active===k)?'block':'none';
    const sample = rows[0];
    html += `<div class="section" id="s_${k}" style="display:${vis}">
      <div class="lhdr">
        <span class="lflag">${FLAGS[comp]||'🏆'}</span>
        <span class="lname">${comp}</span>
        <span class="lbadge">Round ${sample.round_num} · ${sample.category}</span>
      </div>
      <div class="tw"><table>
        <thead><tr>
          <th class="rn">#</th>
          <th>Match</th>
          <th class="hm">Venue</th>
          <th>Kick-off (UTC)</th>
          <th class="hm">Pos</th>
          <th>Status</th>
          <th class="oc" style="background:#f0e8f8;min-width:140px">1 &nbsp; X &nbsp; 2 &nbsp; Odds</th>
        </tr></thead>
        <tbody>`;

    rows.forEach((f,i) => {
      const t = fmtTime(f.match_time);
      const venue = (f.venue_id||'').split(',')[0];
      html += `<tr>
        <td class="rn">${i+1}</td>
        <td><div class="teams">
          <img class="tlogo" src="${f.home_image}" onerror="this.style.display='none'" alt=""/>
          <span class="tn">${f.home_team}</span>
          <span class="vs">VS</span>
          <img class="tlogo" src="${f.away_image}" onerror="this.style.display='none'" alt=""/>
          <span class="tn">${f.away_team}</span>
        </div></td>
        <td class="venue hm">${venue}</td>
        <td><div class="kick">${t.t}<small>${t.date}</small></div></td>
        <td class="hm"><span class="pos">${ord(f.home_position)}</span> <span style="color:#ddd">·</span> <span class="pos">${ord(f.away_position)}</span></td>
        <td><span class="sbadge">${f.status}</span></td>
        <td class="oc">${oddsCell(f)}</td>
      </tr>`;
    });

    html += `</tbody></table></div></div>`;
  });

  document.getElementById('content').innerHTML = html;
}

function setFilter(key, btn){
  active = key;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.section').forEach(s=>{
    const id = s.id.replace('s_','');
    s.style.display = (key==='all'||id===key)?'block':'none';
  });
}

render();
</script>
