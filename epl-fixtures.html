<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EPL Fixtures</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0e0e1a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }
  header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .epl-badge {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #3d195b, #6c2d8a);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 900; color: #fff;
    border: 2px solid #9b4fc4;
  }
  h1 { font-size: 1.5rem; font-weight: 700; }
  h1 span { color: #9b4fc4; }
  .date-badge {
    background: #1e1e30; border: 1px solid #333; border-radius: 20px;
    padding: 4px 14px; font-size: 0.8rem; color: #aaa; margin-bottom: 20px;
  }
  table {
    width: 100%; max-width: 820px; border-collapse: collapse;
    background: #13131f; border-radius: 14px; overflow: hidden;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }
  thead { background: linear-gradient(90deg, #3d195b, #1a1a2e); }
  thead th { padding: 14px 18px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: #c084fc; }
  tbody tr { border-top: 1px solid #1e1e30; transition: background 0.2s; }
  tbody tr:hover { background: #1a1a2e; }
  td { padding: 16px 18px; vertical-align: middle; font-size: 0.95rem; }
  .match-teams { display: flex; align-items: center; gap: 10px; }
  .team-logo { width: 32px; height: 32px; border-radius: 50%; object-fit: contain; background: #fff; padding: 3px; }
  .team-name { font-weight: 600; font-size: 0.95rem; }
  .vs { background: #2a2a40; color: #aaa; font-size: 0.75rem; font-weight: 700; border-radius: 6px; padding: 3px 8px; flex-shrink: 0; }
  .status-badge { display: inline-block; background: #1e3a5f; color: #60aaff; font-size: 0.78rem; font-weight: 600; border-radius: 20px; padding: 4px 12px; border: 1px solid #2a5a8f; }
  .venue { color: #aaa; font-size: 0.85rem; }
  .position { display: inline-block; background: #1f1f35; border-radius: 6px; padding: 2px 8px; font-size: 0.8rem; color: #c084fc; font-weight: 600; }
  .kickoff { font-weight: 600; font-size: 0.95rem; color: #fff; }
  .kickoff small { display: block; color: #888; font-size: 0.75rem; font-weight: 400; }
</style>
</head>
<body>
<header>
  <div class="epl-badge">⚽</div>
  <div>
    <h1>English <span>Premier League</span></h1>
    <div style="color:#aaa;font-size:0.85rem;">2025-2026 Season · Round 29</div>
  </div>
</header>
<div class="date-badge">📅 Thursday, 5 March 2026</div>
<table>
  <thead>
    <tr>
      <th>#</th><th>Match</th><th>Venue</th><th>Kick-off (UTC)</th><th>League Pos.</th><th>Status</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>1</td>
      <td>
        <div class="match-teams">
          <img class="team-logo" src="https://www.imageservera.com/cdn-cgi/image/format=webp/uploadedimages/202508/Aug13/l965mkyh90gr1ge.png" alt="Tottenham" onerror="this.style.display='none'"/>
          <div class="team-name">Tottenham Hotspur</div>
          <div class="vs">VS</div>
          <img class="team-logo" src="https://www.imageservera.com/cdn-cgi/image/format=webp/uploadedimages/202508/Aug13/vl7oqdehzkpr510.png" alt="Crystal Palace" onerror="this.style.display='none'"/>
          <div class="team-name">Crystal Palace</div>
        </div>
      </td>
      <td class="venue">Tottenham Hotspur Stadium</td>
      <td><div class="kickoff">20:00<small>8:00 PM UTC</small></div></td>
      <td><span class="position">16th</span> vs <span class="position">13th</span></td>
      <td><span class="status-badge">🕐 Not Started</span></td>
    </tr>
  </tbody>
</table>
</body>
</html>
